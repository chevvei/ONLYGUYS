<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="OnlyGuys / OnlyGirls — 社交与创作者社区风格展示页（静态演示）" />
    <title>OnlyGuys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="theme-guys">
    <div class="bg-layer" id="bgLayer" aria-hidden="true"></div>
    <div class="bg-scrim" aria-hidden="true"></div>
    <div class="bg-vignette" aria-hidden="true"></div>

    <div class="shell">
      <header class="top-bar">
        <div class="top-bar-left">
          <div class="spin-switch-wrap">
            <div class="spin-hint">
              <span class="spin-hint__label">点击陀螺有惊喜</span>
              <span class="spin-hint__arrow-wrap" aria-hidden="true">
                <svg class="spin-hint__arrow" viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg">
                  <path
                    class="spin-hint__path spin-hint__path--shaft"
                    d="M4 14h30"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.4"
                    stroke-linecap="round"
                  />
                  <path
                    class="spin-hint__path spin-hint__path--head"
                    d="M30 8l12 6-12 6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </div>
            <button
              type="button"
              class="spin-switch"
              id="modeSpin"
              aria-label="切换到 OnlyGirls 主题"
              aria-pressed="false"
              title="切换 OnlyGuys / OnlyGirls"
            >
              <span class="spin-switch__glow" aria-hidden="true"></span>
              <span class="spin-switch__hearts" id="spinHearts" aria-hidden="true"></span>
              <span class="spin-switch__disc" aria-hidden="true">
                <svg class="spin-top-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <ellipse cx="20" cy="30" rx="10" ry="4" class="spin-top-svg__shadow" />
                  <path
                    class="spin-top-svg__body"
                    d="M20 8 L28 26 Q20 30 12 26 Z"
                    stroke="currentColor"
                    stroke-width="0.75"
                    stroke-opacity="0.4"
                    stroke-linejoin="round"
                  />
                  <ellipse cx="20" cy="10" rx="3" ry="2" class="spin-top-svg__tip" />
                </svg>
              </span>
            </button>
          </div>
          <a class="brand-mark" id="brandMark" href="#">OnlyGuys</a>
        </div>
        <nav class="top-nav" aria-label="主导航">
          <a href="#" class="nav-modal-trigger" data-open-modal="discover">发现</a>
          <a href="#">创作者</a>
          <a href="#">订阅</a>
          <a href="#" class="nav-modal-trigger" data-open-modal="about">关于</a>
        </nav>
        <div class="top-actions">
          <button type="button" class="btn btn-ghost">登录</button>
          <button type="button" class="btn btn-primary">免费加入</button>
        </div>
        <button type="button" class="nav-toggle" id="navToggle" aria-label="打开菜单">
          <span></span><span></span><span></span>
        </button>
      </header>

      <div class="mobile-drawer" id="mobileDrawer" hidden>
        <nav class="drawer-nav">
          <a href="#" class="nav-modal-trigger" data-open-modal="discover">发现</a>
          <a href="#">创作者</a>
          <a href="#">订阅</a>
          <a href="#" class="nav-modal-trigger" data-open-modal="about">关于</a>
          <button type="button" class="btn btn-ghost btn-block">登录</button>
          <button type="button" class="btn btn-primary btn-block">免费加入</button>
        </nav>
      </div>

      <main class="page-main">
        <div class="hero">
          <p class="hero-eyebrow">创作者优先 · 订阅制社交</p>
          <h1 class="hero-title" id="heroTitle"><span class="hero-title__text">OnlyGuys</span></h1>
          <p class="hero-sub">
            <span class="hero-sub__inner">连接真实的人，<span class="hero-sub__accent">支持你喜欢的创作者</span>。</span>
          </p>
        </div>

        <section class="comments-section" id="comments" aria-label="访客评论">
          <h2 class="comments-heading">留言与讨论</h2>
          <p class="comments-lead">访客使用 <strong>GitHub</strong> 账号登录即可发表评论（由 Giscus 托管，数据在仓库的 Discussions）。</p>
          <div class="comments-panel">
            <div id="giscus-mount" class="giscus-mount"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-strip of-strip" aria-hidden="true"></div>
        <div class="footer-inner">
          <span class="footer-brand" id="footerBrand">OnlyGuys</span>
          <span class="footer-meta">© 演示站点 · 静态托管</span>
        </div>
      </footer>
    </div>

    <!-- 弹出卡片：发现 -->
    <div
      class="site-modal"
      id="modalDiscover"
      role="dialog"
      aria-modal="true"
      aria-labelledby="discover-modal-title"
      aria-hidden="true"
      hidden
    >
      <button type="button" class="site-modal__backdrop" tabindex="-1" aria-label="关闭" data-close-modal></button>
      <div class="site-modal__sheet">
        <div class="site-modal__panel site-modal__panel--discover">
          <button type="button" class="site-modal__close" data-close-modal aria-label="关闭">
            <span aria-hidden="true">&times;</span>
          </button>
          <p class="site-modal__eyebrow" id="discover-modal-title">发现</p>
          <p class="discover-modal__lead" id="discoverModalLead">发现当下的激情和Guy</p>
        </div>
      </div>
    </div>

    <!-- 弹出卡片：关于 -->
    <div
      class="site-modal"
      id="modalAbout"
      role="dialog"
      aria-modal="true"
      aria-labelledby="about-heading"
      aria-hidden="true"
      hidden
      data-since-fallback="2022-07-16T00:00:00+08:00"
      data-since-near-fallback="2026-10-03T00:00:00+08:00"
    >
      <button type="button" class="site-modal__backdrop" tabindex="-1" aria-label="关闭" data-close-modal></button>
      <div class="site-modal__sheet">
        <div class="site-modal__panel site-modal__panel--about">
          <button type="button" class="site-modal__close" data-close-modal aria-label="关闭">
            <span aria-hidden="true">&times;</span>
          </button>
          <div class="about-inner about-inner--modal">
            <h2 class="about-heading" id="about-heading">关于</h2>
            <div id="about-body" class="about-body"></div>
            <div class="about-timer-block">
              <p class="about-timer" id="aboutTimer" aria-label="相识计时"></p>
              <p class="about-timer" id="aboutTimerNear" aria-label="想靠近你计时"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js" defer></script>
    <script src="js/about-loader.js" defer></script>
    <!-- 必须在 giscus-loader 之前执行，以写入 window.ONLYGUYS_GISCUS -->
    <script src="giscus-config.js" defer></script>
    <script src="js/giscus-loader.js" defer></script>
  </body>
</html>
